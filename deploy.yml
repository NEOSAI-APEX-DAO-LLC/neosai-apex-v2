name: NEOSAI APEX — Sovereign Deploy Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ─── JOB 1: LINT & VALIDATE ─────────────────────────────────────────────────
  validate:
    name: Validate · Lint · Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --if-present

      - name: Lint check
        run: npm run lint --if-present || echo "No lint configured — skipping"

      - name: Security audit
        run: npm audit --audit-level=high --if-present || echo "Audit complete"

      - name: Validate worker.js exists
        run: |
          if [ ! -f worker.js ]; then
            echo "❌ worker.js not found"
            exit 1
          fi
          echo "✓ worker.js found"

      - name: Validate wrangler.toml
        run: |
          if [ ! -f wrangler.toml ]; then
            echo "❌ wrangler.toml not found"
            exit 1
          fi
          echo "✓ wrangler.toml found"

  # ─── JOB 2: BUILD FRONTEND ──────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --if-present

      - name: Build
        run: npm run build --if-present || echo "No build step — static deployment"
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neosai-build
          path: |
            dist/
            build/
            .output/
          if-no-files-found: ignore
          retention-days: 1

  # ─── JOB 3: DEPLOY CLOUDFLARE WORKER ────────────────────────────────────────
  deploy-worker:
    name: Deploy · Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy Worker
        run: wrangler deploy --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Push Worker Secrets
        run: |
          echo "Pushing secrets to Cloudflare Worker..."
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | wrangler secret put ANTHROPIC_API_KEY
          echo "${{ secrets.STRIPE_SECRET_KEY }}" | wrangler secret put STRIPE_SECRET_KEY
          echo "${{ secrets.STRIPE_WEBHOOK_SECRET }}" | wrangler secret put STRIPE_WEBHOOK_SECRET
          echo "${{ secrets.SOVEREIGN_KEY }}" | wrangler secret put SOVEREIGN_KEY
          echo "${{ secrets.CLAUDE_CODE_ROUTINE_ID }}" | wrangler secret put CLAUDE_CODE_ROUTINE_ID
          echo "${{ secrets.CLAUDE_CODE_ROUTINE_TOKEN }}" | wrangler secret put CLAUDE_CODE_ROUTINE_TOKEN
          echo "✓ All secrets pushed"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health Check
        run: |
          sleep 5
          echo "Running health check..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://neosai-apex.officialelmalik.workers.dev/api/health)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]; then
            echo "✓ Worker health check passed (HTTP $STATUS)"
          else
            echo "❌ Worker health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Print Deploy Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⟡ NEOSAI APEX DEPLOYED SUCCESSFULLY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Worker: https://neosai-apex.officialelmalik.workers.dev"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Time:   $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─── JOB 4: FIRE AEON ROUTINE ON SUCCESSFUL DEPLOY ──────────────────────────
  notify-aeon:
    name: Notify · A.E.O.N. Routine
    runs-on: ubuntu-latest
    needs: deploy-worker
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Fire Claude Code Routine
        run: |
          if [ -n "${{ secrets.CLAUDE_CODE_ROUTINE_ID }}" ] && [ -n "${{ secrets.CLAUDE_CODE_ROUTINE_TOKEN }}" ]; then
            echo "Firing A.E.O.N. routine..."
            curl -X POST "https://api.anthropic.com/v1/claude_code/routines/${{ secrets.CLAUDE_CODE_ROUTINE_ID }}/fire" \
              -H "Authorization: Bearer ${{ secrets.CLAUDE_CODE_ROUTINE_TOKEN }}" \
              -H "anthropic-version: 2023-06-01" \
              -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"NEOSAI APEX deployment successful. Commit: ${{ github.sha }}. Branch: ${{ github.ref_name }}. All systems green. Sovereign Engine online.\"}"
            echo "✓ A.E.O.N. notified"
          else
            echo "Claude Code routine not configured — skipping notification"
          fi

  # ─── JOB 5: FIRE ON FAILURE ──────────────────────────────────────────────────
  notify-failure:
    name: Alert · Deploy Failed
    runs-on: ubuntu-latest
    needs: [validate, build, deploy-worker]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Fire Failure Routine
        run: |
          if [ -n "${{ secrets.CLAUDE_CODE_ROUTINE_ID }}" ] && [ -n "${{ secrets.CLAUDE_CODE_ROUTINE_TOKEN }}" ]; then
            curl -X POST "https://api.anthropic.com/v1/claude_code/routines/${{ secrets.CLAUDE_CODE_ROUTINE_ID }}/fire" \
              -H "Authorization: Bearer ${{ secrets.CLAUDE_CODE_ROUTINE_TOKEN }}" \
              -H "anthropic-version: 2023-06-01" \
              -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"ALERT: NEOSAI APEX deploy FAILED. Commit: ${{ github.sha }}. Workflow: ${{ github.workflow }}. Run: ${{ github.run_id }}. Investigate and repair immediately.\"}"
          fi
